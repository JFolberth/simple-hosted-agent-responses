name: Deploy Source Code (Bicep)

on:
  workflow_call:
    inputs:
      agent_name:
        description: Foundry hosted agent name
        required: true
        type: string
      environment_name:
        description: Environment name — used in resource naming and Bicep params
        required: true
        type: string
      location:
        description: Azure region for the resource group
        required: true
        type: string
      ai_deployments_location:
        description: Azure region for AI model deployments
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep infrastructure
        id: deploy-iac
        uses: ./.github/actions/deploy-bicep
        with:
          environment_name: ${{ inputs.environment_name || 'main' }}
          location: ${{ inputs.location || 'swedencentral' }}

      - name: Download source-code artifact
        uses: actions/download-artifact@v8
        with:
          name: source-code
          path: ./.artifacts/source-code

      - name: Update agent with source code
        uses: ./.github/actions/update-agent-source-code
        with:
          project_endpoint: ${{ steps.deploy-iac.outputs.project_endpoint }}
          agent_name: ${{ inputs.agent_name }}
          source_code_zip: ./.artifacts/source-code/source-code.zip
          model_deployment_name: ${{ steps.deploy-iac.outputs.model_deployment_name }}
