name: Deploy Source Code (Terraform)

on:
  workflow_call:
    inputs:
      agent_name:
        description: Foundry hosted agent name
        required: true
        type: string
      environment_name:
        description: Environment name — used in resource naming and Terraform vars
        required: true
        type: string
      location:
        description: Azure region for the resource group
        required: true
        type: string
      ai_deployments_location:
        description: Azure region for AI model deployments
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Terraform infrastructure
        id: deploy-iac
        uses: ./.github/actions/deploy-terraform
        with:
          environment_name: ${{ inputs.environment_name }}
          location: ${{ inputs.location || 'swedencentral' }}
          ai_deployments_location: ${{ inputs.ai_deployments_location || 'swedencentral' }}
          backend_resource_group: ${{ vars.TF_BACKEND_RESOURCE_GROUP }}
          backend_storage_account: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}
          backend_container: ${{ vars.TF_BACKEND_CONTAINER }}
          backend_key: ${{ vars.TF_BACKEND_KEY }}

      - name: Download source-code artifact
        uses: actions/download-artifact@v8
        with:
          name: source-code
          path: ./.artifacts/source-code

      - name: Update agent with source code
        uses: ./.github/actions/update-agent-source-code
        with:
          project_endpoint: ${{ steps.deploy-iac.outputs.project_endpoint }}
          agent_name: ${{ inputs.agent_name }}
          source_code_zip: ./.artifacts/source-code/source-code.zip
          model_deployment_name: ${{ steps.deploy-iac.outputs.model_deployment_name }}
