name: Deploy

on:
  workflow_call:
    inputs:
      image_tag:
        description: Image tag produced by the build job
        required: true
        type: string
      image_name:
        description: Container image name
        required: true
        type: string
      agent_name:
        description: Foundry hosted agent name
        required: true
        type: string
      environment_name:
        description: Environment name (used in resource naming)
        required: true
        type: string
      location:
        description: Azure region for the resource group
        required: true
        type: string
      ai_deployments_location:
        description: Azure region for AI model deployments
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

jobs:
  # ── Deploy Bicep IaC + push image + update agent ───────────────────────────
  deploy-bicep:
    name: Deploy (Bicep)
    uses: ./.github/workflows/deploy-bicep.yml
    with:
      image_name: ${{ inputs.image_name }}
      image_tag: ${{ inputs.image_tag }}
      agent_name: ${{ inputs.agent_name }}
      environment_name: ${{ inputs.environment_name }}
      location: ${{ inputs.location }}
      ai_deployments_location: ${{ inputs.ai_deployments_location }}
    secrets: inherit

  # ── Deploy Terraform IaC + push image + update agent ──────────────────────
  deploy-terraform:
    name: Deploy (Terraform)
    uses: ./.github/workflows/deploy-terraform.yml
    with:
      image_name: ${{ inputs.image_name }}
      image_tag: ${{ inputs.image_tag }}
      agent_name: ${{ inputs.agent_name }}
      environment_name: ${{ inputs.environment_name }}
      location: ${{ inputs.location }}
      ai_deployments_location: ${{ inputs.ai_deployments_location }}
    secrets: inherit
