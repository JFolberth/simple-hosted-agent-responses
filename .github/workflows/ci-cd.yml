name: CI/CD

# Push to main and manual runs trigger the full build → deploy pipeline.
# Config is read from repository variables; workflow_dispatch inputs override them.
#
# Required repo vars: ENVIRONMENT_NAME
# Optional repo vars (have hardcoded defaults): IMAGE_NAME, AGENT_NAME, AZURE_LOCATION, AZURE_AI_DEPLOYMENTS_LOCATION

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:
    inputs:
      image_name:
        description: Container image name — overrides vars.IMAGE_NAME
        required: false
      agent_name:
        description: Foundry hosted agent name — overrides vars.AGENT_NAME
        required: false
      environment_name:
        description: Environment name — overrides vars.ENVIRONMENT_NAME
        required: false
      location:
        description: Azure region for the resource group — overrides vars.AZURE_LOCATION
        required: false
      ai_deployments_location:
        description: Azure region for AI model deployments — overrides vars.AZURE_AI_DEPLOYMENTS_LOCATION
        required: false

jobs:
  # ── Build (lint + validate + image) ────────────────────────────────────────────
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  # ── Deploy — Bicep IaC + push image + update agent ────────────────────────
  deploy-bicep:
    name: Deploy (Bicep)
    needs: build
    uses: ./.github/workflows/deploy-bicep.yml
    permissions:
      id-token: write
      contents: read
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
      image_name: ${{ inputs.image_name || vars.IMAGE_NAME || 'agent-framework-basic-responses' }}
      agent_name: ${{ inputs.agent_name || vars.AGENT_NAME || 'agent-framework-agent-basic-responses' }}
      environment_name: ${{ inputs.environment_name || vars.ENVIRONMENT_NAME }}
      location: ${{ inputs.location || vars.AZURE_LOCATION || 'swedencentral' }}
      ai_deployments_location: ${{ inputs.ai_deployments_location || vars.AZURE_AI_DEPLOYMENTS_LOCATION || 'swedencentral' }}
    secrets: inherit

  # ── Deploy — Terraform IaC + push image + update agent ────────────────────
  deploy-terraform:
    name: Deploy (Terraform)
    needs: build
    uses: ./.github/workflows/deploy-terraform.yml
    permissions:
      id-token: write
      contents: read
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
      image_name: ${{ inputs.image_name || vars.IMAGE_NAME || 'agent-framework-basic-responses' }}
      agent_name: ${{ inputs.agent_name || vars.AGENT_NAME || 'agent-framework-agent-basic-responses' }}
      environment_name: ${{ inputs.environment_name || vars.ENVIRONMENT_NAME }}
      location: ${{ inputs.location || vars.AZURE_LOCATION || 'swedencentral' }}
      ai_deployments_location: ${{ inputs.ai_deployments_location || vars.AZURE_AI_DEPLOYMENTS_LOCATION || 'swedencentral' }}
    secrets: inherit
