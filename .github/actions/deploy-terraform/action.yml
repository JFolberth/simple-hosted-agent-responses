name: Deploy Terraform Infrastructure
description: Deploys Azure infrastructure via Terraform and returns IaC outputs. Assumes Azure CLI is authenticated and ARM_ env vars are set at the calling job level.

inputs:
  environment_name:
    description: Environment name passed as a Terraform variable
    required: false
    default: ''
  location:
    description: Azure region for the resource group
    required: false
    default: swedencentral
  ai_deployments_location:
    description: Azure region for AI model deployments
    required: false
    default: swedencentral
  backend_resource_group:
    description: Resource group of the remote state storage account (optional — local state used if omitted)
    required: false
    default: ''
  backend_storage_account:
    description: Storage account name for remote state (optional)
    required: false
    default: ''
  backend_container:
    description: Blob container name for remote state (optional)
    required: false
    default: ''
  backend_key:
    description: State blob key (filename) for remote state (optional)
    required: false
    default: ''

outputs:
  project_endpoint:
    description: Foundry project endpoint URL
    value: ${{ steps.read-outputs.outputs.project_endpoint }}
  model_deployment_name:
    description: AI model deployment name
    value: ${{ steps.read-outputs.outputs.model_deployment_name }}
  acr_endpoint:
    description: Container registry login server
    value: ${{ steps.read-outputs.outputs.acr_endpoint }}

runs:
  using: composite
  steps:
    - name: Download Terraform code artifact
      uses: actions/download-artifact@v8
      with:
        name: terraform-code
        path: infra/terraform/

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ">= 1.9"
        # Disable wrapper so terraform output is parseable
        terraform_wrapper: false

    - name: Configure remote backend
      # Generates backend_override.tf if all four TF_BACKEND_* vars are provided.
      # Terraform override files take precedence over backend "local" {} in providers.tf,
      # switching the backend to azurerm for this run without modifying providers.tf.
      shell: bash
      working-directory: infra/terraform
      env:
        BACKEND_RG: ${{ inputs.backend_resource_group }}
        BACKEND_SA: ${{ inputs.backend_storage_account }}
        BACKEND_CONTAINER: ${{ inputs.backend_container }}
        BACKEND_KEY: ${{ inputs.backend_key }}
      run: |
        if [[ -n "$BACKEND_SA" && -n "$BACKEND_RG" && -n "$BACKEND_CONTAINER" && -n "$BACKEND_KEY" ]]; then
          printf 'terraform {\n  backend "azurerm" {\n    resource_group_name  = "%s"\n    storage_account_name = "%s"\n    container_name       = "%s"\n    key                  = "%s"\n    use_azuread_auth     = true\n  }\n}\n' \
            "$BACKEND_RG" "$BACKEND_SA" "$BACKEND_CONTAINER" "$BACKEND_KEY" > backend_override.tf
          echo "Remote backend: ${BACKEND_SA}/${BACKEND_CONTAINER}/${BACKEND_KEY}"
        else
          echo "No TF_BACKEND_* vars set — using local state."
        fi

    - name: Terraform init
      shell: bash
      working-directory: infra/terraform
      run: terraform init

    - name: Terraform apply
      shell: bash
      working-directory: infra/terraform
      env:
        ENVIRONMENT_NAME: ${{ inputs.environment_name }}
        LOCATION: ${{ inputs.location }}
        AI_DEPLOYMENTS_LOCATION: ${{ inputs.ai_deployments_location }}
      run: |
        terraform apply -auto-approve -input=false \
          -var="environment_name=${ENVIRONMENT_NAME}" \
          -var="location=${LOCATION}" \
          -var="ai_deployments_location=${AI_DEPLOYMENTS_LOCATION}" \
          -var-file=terraform.tfvars

    - name: Read Terraform outputs
      id: read-outputs
      shell: bash
      working-directory: infra/terraform
      run: |
        OUTPUTS=$(terraform output -json)
        _get() { echo "$OUTPUTS" | python3 -c "import sys,json; print(json.load(sys.stdin)['$1']['value'])"; }
        echo "project_endpoint=$(_get AZURE_AI_PROJECT_ENDPOINT)" >> "$GITHUB_OUTPUT"
        echo "model_deployment_name=$(_get AZURE_AI_MODEL_DEPLOYMENT_NAME)" >> "$GITHUB_OUTPUT"
        echo "acr_endpoint=$(_get AZURE_CONTAINER_REGISTRY_ENDPOINT)" >> "$GITHUB_OUTPUT"
